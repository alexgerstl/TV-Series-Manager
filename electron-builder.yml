appId: com.alexg.tvseriesmanager
productName: TV Series Manager
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# No auto-update server for v1 (architecture.md §2).
publish: null
